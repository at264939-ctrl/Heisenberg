[package]
name = "heisenberg"
version = "0.1.0"
edition = "2021"
authors = ["Heisenberg <you@know.who>"]
description = "A fully local autonomous AI agent — say my name."
license = "MIT"

[[bin]]
name = "heisenberg"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
clap = { version = "4", features = ["derive"] }
sysinfo = "0.30"
anyhow = "1"
thiserror = "1"
tokio-postgres = { version = "0.7", features = ["with-serde_json-1"] }
deadpool-postgres = "0.12"
flume = "0.11"
image = "0.25"

# Optional: llama-cpp integration (enable via feature when local binding is available)
llama-cpp = { version = "0.1", optional = true }

[features]
default = [ "llama-cli" ]
llama-binding = [ "llama-cpp" ]
llama-cli = []

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
